<!DOCTYPE html>
<html lang="it" class="black">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auletta LDR — Imposta la password</title>

  <!-- fogli di stile -->
  <link rel="stylesheet" href="/src/style/main.css">
  <link rel="stylesheet" href="/src/style/responsive.css">

  <!-- favicon -->
  <link rel="icon" type="image/webp" href="/src/img/logo-prenotaldr-giallo.webp">

  <!-- font da googlefonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,100..700;1,100..700&display=swap"
    rel="stylesheet">
  <!--  -->

</head>

<body class="full-page-form-body">

  <main>
    <form id="set-password-form" novalidate method="post" action="javascript:void(0)">

      <section class="form-block horizontal">
        <h1>Ci sei quasi, imposta la tua password</h1>
      </section>

      <section class="form-block">
        <div class="form-block">
          <label for="password"><span>Nuova password</span></label>
          <input id="password" name="password" type="password" placeholder="Almeno 8 caratteri"
            autocomplete="new-password" minlength="8" required>
        </div>
        <div class="form-block">
          <label for="conferma-password"><span>Conferma password</span></label>
          <input id="conferma-password" name="conferma-password" type="password" placeholder="Ripeti la password"
            autocomplete="new-password" minlength="8" required>
        </div>
      </section>

      <section class="form-block">
        <button type="submit" class="active">Salva password e accedi</button>
      </section>

    </form>
  </main>

  <script type="module" src="/src/js/auth.js"></script>

</body>

</html>
