<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auletta LDR — Imposta la password</title>

    <!-- fogli di stile -->
    <link rel="stylesheet" href="/src/style/main.css">
    <link rel="stylesheet" href="/src/style/responsive.css">

    <!-- favicon -->
    <link rel="icon" type="image/webp" href="/src/img/logo-prenotaldr-giallo.webp">

    <!-- font da googlefonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
    <!--  -->
    
  </head>

  <body class="full-page-form-body">

    <main id="set-password-form">

      <section class="form-block horizontal">
        <h1>Ci sei quasi, imposta la tua password</h1>
      </section>

      <section class="form-block">
        <div class="form-block">
          <label for="password"><span>Nuova password</span></label>
          <input name="password" type="password" placeholder="Almeno 8 caratteri">
        </div>
        <div class="form-block">
          <label for="conferma-password"><span>Conferma password</span></label>
          <input name="conferma-password" type="password" placeholder="Ripeti la password">
        </div>
      </section>

      <section class="form-block">
        <button type="submit" class="active">Salva password e accedi</button>
      </section>

    </main>

    <script type="module" src="/src/js/auth.js"></script>

  </body>
</html>
