<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Auletta LDR — Registrati</title>

    <!-- fogli di stile -->
    <link rel="stylesheet" href="/src/style/main.css">

    <!-- font da googlefonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
    <!--  -->

</head>

<body class="full-page-form-body">

    <main id="register-form">

        <section class="form-block horizontal">
            <h1>Registrati tramite la tua tessera LDR</h1>
        </section>

        <section class="form-block">

            <div class="form-block">
                <label for="n-tessera"><span>Numero tessera</span></label>
                <input name="n-tessera" type="number" placeholder="0000">
            </div>

        </section>

        <section class="form-block">
            <button type="submit" class="active">Ricevi codice via mail</button>
            <h3>Hai già un'account? <a href="login.html">Accedi</a></h3>
        </section>

    </main>

    <script type="module" src="/src/js/auth.js"></script>

</body>

</html>
