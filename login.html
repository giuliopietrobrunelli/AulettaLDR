<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        
        <title>Auletta LDR — Effettua l'accesso</title>
    
        <!-- fogli di stile -->
        <link rel="stylesheet" href="/src/style/main.css">
    
        <!-- font da googlefonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
        <!--  -->
    
    </head>
<body class="full-page-form-body">

    <main id="login-form">

        <section class="form-block horizontal">
            <img src="/src/img/logo-prenotaldr-giallo.webp" alt="">
            <!-- <img src="/src/img/logo-prenotaldr-nb-nero.webp" alt=""> -->
            <h1>Accedi per prenotare l'auletta</h1>
            <!-- <h3>Effettua l’accesso al tuo account, oppure <a>creane uno</a></h3> -->
        </section>

        <section class="form-block">

            <div class="form-block">
                <label for="n-tessera"><span>Email / Numero tessera</span></label>
                <input name="n-tessera" type="text" placeholder="tuamail@esempio.it">
            </div>
            <div class="form-block">
                <label for="password"><span>Password</span></label>
                <input name="password" type="password" placeholder="Inserisci la password">
            </div>

        </section>

        <section class="form-block">
            <button type="submit" class="active">Effettua l'accesso</button>
            <h3>Non hai ancora un'account? <a href="register.html">Creane uno</a></h3>
        </section>

    </main>

</body>
</html>
